name: Production Commercial CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-production-bsp:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/siemens/kas/kas:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Shared Caching Directories
        run: |
          mkdir -p /workdir/sstate-cache
          mkdir -p /workdir/downloads

      - name: Restore Yocto Caches
        uses: actions/cache@v3
        with:
          path: |
            /workdir/sstate-cache
            /workdir/downloads
          key: yocto-commercial-cache-${{ hashFiles('kas.yml') }}
          restore-keys: |
            yocto-commercial-cache-

      - name: Execute Strict Metadata Parse & Layer Validation
        run: |
          kas shell kas.yml -c "bitbake -p"
          kas shell kas.yml -c "bitbake-layers show-layers"

      - name: Run Full Production Build (Image & SDK)
        run: |
          kas build kas.yml

      - name: Archive Production Artifacts and SDK
        uses: actions/upload-artifact@v4
        with:
          name: commercial-bsp-release-bundle
          path: |
            build/tmp/deploy/images/raspberrypi4/**/*.wic*
            build/tmp/deploy/images/raspberrypi4/**/*.sdimg*
            build/tmp/deploy/images/raspberrypi4/**/*.bmap
            build/tmp/deploy/images/raspberrypi4/**/*.manifest
            build/sdk/*.sh
