header:
  version: 14

machine: raspberrypi4
distro: poky

repos:
  poky:
    url: https://git.yoctoproject.org/poky
    refspec: scarthgap
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-raspberrypi:
    url: https://git.yoctoproject.org/meta-raspberrypi
    refspec: scarthgap

  meta-openembedded:
    url: https://github.com/openembedded/meta-openembedded.git
    refspec: scarthgap
    layers:
      meta-oe:
      meta-networking:
      meta-python:
      meta-filesystems:
      meta-multimedia:

  meta-qt6:
    url: https://github.com/meta-qt6/meta-qt6.git
    refspec: scarthgap

  # Custom MyPhone Layers
  meta-myphone:
    path: layers/meta-myphone

  meta-myphone-bsp:
    path: layers/meta-myphone-bsp

  meta-myphone-ui:
    path: layers/meta-myphone-ui

  meta-myphone-apps:
    path: layers/meta-myphone-apps

  meta-myphone-security:
    path: layers/meta-myphone-security

  meta-myphone-update:
    path: layers/meta-myphone-update

bblayers_conf_header: |
  POKY_BBLAYERS_CONF_VERSION = "2"
  BBPATH = "${TOPDIR}"
  BBFILES ?= ""

local_conf_header:
  standard: |
    CONF_VERSION = "2"
    PACKAGE_CLASSES = "package_ipk"
    EXTRA_IMAGE_FEATURES ?= "debug-tweaks package-management"
    USER_CLASSES ?= "buildstats"
    PATCHRESOLVE = "noop"
    
    # Disk space monitoring configuration
    BB_DISKMON_DIRS ??= "\
        STOPTASKS,${DL_DIR},1G,100K \
        STOPTASKS,${SSTATE_DIR},1G,100K \
        ABORT,${DL_DIR},100M,1K \
        ABORT,${SSTATE_DIR},100M,1K"
        
    # Enable systemd as init manager
    DISTRO_FEATURES:append = " systemd"
    VIRTUAL-RUNTIME_init_manager = "systemd"
    VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
