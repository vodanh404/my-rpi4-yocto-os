header:
  version: 14

machine: raspberrypi4-64
distro: poky
target: myphone-image

repos:
  poky:
    url: https://git.yoctoproject.org/poky
    branch: scarthgap

    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    branch: scarthgap
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-multimedia:

  meta-qt6:
    url: https://code.qt.io/yocto/meta-qt6.git
    branch: 6.8

  meta-raspberrypi:
    url: https://git.yoctoproject.org/meta-raspberrypi
    branch: scarthgap

  meta-myphone:
    path: meta-myphone

  meta-myphone-bsp:
    path: meta-myphone-bsp

  meta-myphone-ui:
    path: meta-myphone-ui

  meta-myphone-apps:
    path: meta-myphone-apps

  meta-myphone-security:
    path: meta-myphone-security

  meta-myphone-update:
    path: meta-myphone-update

local_conf_header:

  myphone: |

    PACKAGE_CLASSES = "package_rpm"

    EXTRA_IMAGE_FEATURES += "ssh-server-openssh"

    LICENSE_FLAGS_ACCEPTED = "commercial"

    DISTRO_FEATURES:append = " wayland opengl systemd"

    VIRTUAL-RUNTIME_init_manager = "systemd"

    ENABLE_UART = "1"

    GPU_MEM = "128"

    IMAGE_FSTYPES += "wic.bz2 wic.xz"

bblayers_conf_header:

  myphone: |
