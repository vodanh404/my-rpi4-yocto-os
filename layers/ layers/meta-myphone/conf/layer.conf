BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-myphone"
BBFILE_PATTERN_meta-myphone = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-myphone = "10"

LAYERDEPENDS_meta-myphone = "core raspberrypi openembedded-layer"
LAYERSERIES_COMPAT_meta-myphone = "kirkstone"
