BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-myphone-apps"
BBFILE_PATTERN_meta-myphone-apps = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-myphone-apps = "8"

LAYERDEPENDS_meta-myphone-apps = "core meta-myphone-ui"
LAYERSERIES_COMPAT_meta-myphone-apps = "scarthgap"
