# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-myphone-ui"
BBFILE_PATTERN_meta-myphone-ui = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-myphone-ui = "7"

LAYERDEPENDS_meta-myphone-ui = "core meta-myphone-bsp"
LAYERSERIES_COMPAT_meta-myphone-ui = "scarthgap"
